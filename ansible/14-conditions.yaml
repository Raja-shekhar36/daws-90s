- name: even or odd
  hosts: local
  connection: local
  vars:
    given_number: 7
  tasks: 
  - when: given_number % 2 == 0
    name: is even
    debug:
      msg: "Given number: {{ given_number }} is even"
    
  - name: is odd
    debug:
      msg: "Given number: {{ given_number }} is odd"
    when: given_number % 2 != 0