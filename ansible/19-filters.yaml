- name: demo on filters
  hosts: local
  connection: local
  vars:
    topics: Linux, Shell, Ansible, Terraform
    tagMap:
      name: Ansible
      project: roboshop
      envronment: dev
    full_name: Rajashekhar Reddy G
    ip_address: 172.168.30.22
    tagsList: [
       {
            key: "name",
            value: "Ansible"
        },
        {
            key: "project",
            value: "roboshop"
        },
        {
            key: "envronment",
            value: "dev"
        }
    ]
  tasks: 
  - name: convert string to list
    debug: 
      msg: "Topics are: {{ topics | split(',') }}"

  - name: set default value
    debug: 
      msg: "Hi {{ GEETING | default('Good Morning') }}"

  - name: convert map to list
    debug:
      msg: "{{ tagMap | dict2items }}"

  - name: convert list to map
    debug:
      msg: "{{ tagsList | items2dict }}"

  - name: convert to uppr case
    debug:
      msg: "{{ full_name | upper }}"

  - name: convert to lowercase
    debug:
      msg: "{{ full_name | lower }}"
  
  - name: check ipv4 address
    debug: 
      msg: "{{ ip_address | ansible.utils.ipv4 }}"