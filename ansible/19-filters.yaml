- name: demo on filters
  hosts: local
  connection: local
  vars:
    topics: Linux, Shell, Ansible, Terraform
    tagMap:
      name: Ansible
      project: roboshop
      envronment: dev
    full_name: Rajashekhar Reddy G
    tagsList: [
       {
            key: "name",
            value: "Ansible"
        },
        {
            key: "project",
            value: "roboshop"
        },
        {
            key: "envronment",
            value: "dev"
        }
    ]
  tasks: 
  - name: convert string to list
    debug: 
      msg: "Topics are: {{ topics | split(',') }}"

  - name: set default value
    debug: 
      msg: "Hi {{ GEETING | default('Good Morning') }}"

  - name: convert map to list
    debug:
      msg: "{{ tagMap | dict2items }}"

  - name: convert list to map
    debug:
      msg: "{{ tagsList | items2dict }}"