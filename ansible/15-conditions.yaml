- name: coditions using ansible_facts
  hosts: frontend
  tasks: 
  - name: print if RedHat
    debug:
      msg: "OS family is RedHat, package manager is dnf"
    when: ansible_facts.os_family == "RedHat"

  - name: print if Debian
    debug:
      msg: "OS family is Debian, package manager is apt-get"
    when: ansible_facts.os_family == "Debian"  